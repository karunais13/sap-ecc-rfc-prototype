# Reverse-proxy sample for the SAP RFC MCP container.
#
# Forwards /mcp/* (and the per-country paths /mcp/{code}) to the container
# without rewriting the path, so the app can dispatch by country code.
# Streamable-HTTP needs buffering disabled so SSE responses stream through.

upstream sap_mcp {
    server sap-mcp:8000;   # container name on the docker network, or host:port
}

server {
    listen 443 ssl;
    server_name mcp.example.com;

    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # MCP endpoints: /mcp/my, /mcp/th, /mcp/id, ...
    location /mcp/ {
        proxy_pass http://sap_mcp;          # path preserved (no trailing URI)
        proxy_http_version 1.1;

        # Stream SSE responses immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Optional auth — uncomment to require a bearer token / basic auth.
        # auth_basic "SAP MCP";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # Health/discovery (lists served countries).
    location = /healthz {
        proxy_pass http://sap_mcp;
    }
}
